calc_params:
  model: "pet-omad-s"
  version: "1.0.0"
  device: "cpu"
  dtype: "float64"

# Sampling parameters for fc -> modes
modes:
  qpts: [[0., 0., 0.], [0.25, 0., 0.], [0.5, 0.5, 0.5]]
  weights: [0.25, 0.25, 0.5]

abins_kwargs:
  AbInitioProgram: "JSON"
  TemperatureInKelvin: 10
  Atoms: ""
  SaveAscii: false
  SumContributions: true
  ScaleByCrossSection: "Total"
  QuantumOrderEventsNumber: "1"
  Autoconvolution: false
  EnergyUnits: "meV"
  BinWidthInWavenumber: 1.4
