[build-system]
requires = ["setuptools >= 77.0.3"]
build-backend = "setuptools.build_meta"

[project]
name = "abins-lib"
version = "0.0.1"
requires-python = ">=3.11"

dependencies = [
    "euphonic >= 1.5.1,<2",
    "resins == 0.1.0",
]

[dependency-groups]
test = ["pytest>=9.0,<10.0"]
lint = ["ruff>=0.15.2,<1.0"]
dev = [
    {include-group = 'test'},
    {include-group = 'lint'},
]

[project.urls]
Repository = "https://github.com/pace-neutrons/abins-lib"

[tool.setuptools.packages.find]
where =  ["src"]

[tool.pytest]
addopts = ["--import-mode=importlib"]
minversion = "9.0"
testpaths = ["tests"]

[tool.ruff]
line-length = 88
target-version = "py311"

[tool.ruff.lint.isort]
force-sort-within-sections = true
