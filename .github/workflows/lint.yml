name: Ruff

on:
  push:
    branches:
      - 'main'
  pull_request:
    types: [opened, reopened, labeled, synchronize]

jobs:
  lint:

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install ruff
        uses: astral-sh/ruff-action@v3
        with:
          args: "--version"

      - name: ruff check
        shell: bash -el {0}
        run: ruff check --fix

      - name: ruff format
        if: always()  # Run this even if ruff check failed
        shell: bash -el {0}
        run: ruff format --diff
